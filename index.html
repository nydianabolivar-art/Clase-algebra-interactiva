<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plataforma de Álgebra Básica - UCompensar</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            overflow: hidden;
        }

        /* HEADER */
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.95;
        }

        /* MAIN LAYOUT */
        .main-wrapper {
            display: flex;
            min-height: 600px;
        }

        /* SIDEBAR */
        .sidebar {
            width: 280px;
            background: #f8f9fa;
            border-right: 2px solid #e9ecef;
            padding: 20px;
            overflow-y: auto;
            max-height: calc(100vh - 200px);
        }

        .sidebar h3 {
            color: #667eea;
            font-size: 1.2em;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .nav-section {
            margin-bottom: 25px;
        }

        .nav-section h4 {
            color: #495057;
            font-size: 0.9em;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .module-btn {
            display: block;
            width: 100%;
            padding: 12px 15px;
            margin-bottom: 8px;
            background: white;
            border: 2px solid #dee2e6;
            border-radius: 6px;
            cursor: pointer;
            text-align: left;
            transition: all 0.3s ease;
            font-size: 0.95em;
            color: #495057;
            font-weight: 500;
            position: relative;
        }

        .module-btn:hover:not(.locked) {
            background: #e7f3ff;
            border-color: #667eea;
            color: #667eea;
        }

        .module-btn.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .module-btn.completed {
            background: #d4edda;
            border-color: #28a745;
            color: #155724;
        }

        .module-btn.active.completed {
            background: #28a745;
            color: white;
        }

        .module-btn.locked {
            background: #f8f9fa;
            border-color: #dee2e6;
            color: #adb5bd;
            cursor: not-allowed;
            opacity: 0.6;
        }

        .module-btn::before {
            content: '○ ';
            margin-right: 8px;
        }

        .module-btn.completed::before {
            content: '✓ ';
            margin-right: 8px;
        }

        .module-btn.locked::before {
            content: '🔒 ';
            margin-right: 8px;
        }

        /* CONTENT AREA */
        .content {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
            max-height: calc(100vh - 200px);
        }

        .content h2 {
            color: #667eea;
            font-size: 2em;
            margin-bottom: 20px;
            border-bottom: 3px solid #667eea;
            padding-bottom: 15px;
        }

        .progress-bar-container {
            background: #e9ecef;
            border-radius: 10px;
            height: 8px;
            margin-bottom: 30px;
            overflow: hidden;
        }

        .progress-bar {
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            height: 100%;
            border-radius: 10px;
            transition: width 0.3s ease;
        }

        /* SECCIONES */
        .section {
            margin-bottom: 40px;
        }

        .section h3 {
            color: #495057;
            font-size: 1.4em;
            margin-bottom: 15px;
            border-left: 4px solid #667eea;
            padding-left: 15px;
        }

        .definition-box {
            background: #f0f4ff;
            border-left: 4px solid #667eea;
            padding: 20px;
            border-radius: 6px;
            margin-bottom: 20px;
            line-height: 1.8;
        }

        .definition-box strong {
            color: #667eea;
            font-size: 1.05em;
        }

        .example-box {
            background: #fff3cd;
            border-left: 4px solid #ffc107;
            padding: 20px;
            border-radius: 6px;
            margin-bottom: 20px;
            line-height: 1.8;
        }

        .example-box h4 {
            color: #856404;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .formula {
            background: #e8f4f8;
            padding: 15px;
            border-radius: 6px;
            font-family: 'Courier New', monospace;
            margin: 15px 0;
            color: #0c5460;
            border-left: 4px solid #17a2b8;
        }

        /* EJERCICIOS */
        .exercise-container {
            background: #f8f9fa;
            padding: 25px;
            border-radius: 8px;
            margin-bottom: 20px;
            border: 2px solid #dee2e6;
        }

        .exercise-title {
            color: #667eea;
            font-weight: 600;
            margin-bottom: 15px;
            font-size: 1.1em;
        }

        .exercise-difficulty {
            display: inline-block;
            font-size: 0.85em;
            padding: 4px 10px;
            border-radius: 4px;
            margin-left: 10px;
            font-weight: 600;
        }

        .difficulty-basic {
            background: #d4edda;
            color: #155724;
        }

        .difficulty-intermediate {
            background: #fff3cd;
            color: #856404;
        }

        .difficulty-advanced {
            background: #f8d7da;
            color: #721c24;
        }

        .question {
            background: white;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 15px;
            line-height: 1.6;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        input[type="text"],
        input[type="number"],
        select,
        textarea {
            flex: 1;
            min-width: 150px;
            padding: 10px 15px;
            border: 2px solid #dee2e6;
            border-radius: 6px;
            font-size: 1em;
            transition: border-color 0.3s ease;
            font-family: inherit;
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        input[type="text"]:focus,
        input[type="number"]:focus,
        select:focus,
        textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 5px rgba(102, 126, 234, 0.2);
        }

        button {
            padding: 12px 25px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1em;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        button:hover {
            background: #764ba2;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            background: #adb5bd;
            cursor: not-allowed;
            transform: none;
        }

        .btn-secondary {
            background: #6c757d;
        }

        .btn-secondary:hover {
            background: #5a6268;
        }

        .btn-success {
            background: #28a745;
        }

        .btn-success:hover {
            background: #218838;
        }

        .btn-danger {
            background: #dc3545;
        }

        .btn-danger:hover {
            background: #c82333;
        }

        .btn-warning {
            background: #ffc107;
            color: #333;
        }

        .btn-warning:hover {
            background: #e0a800;
        }

        /* FEEDBACK */
        .feedback {
            padding: 15px;
            border-radius: 6px;
            margin-top: 15px;
            display: none;
            animation: slideIn 0.3s ease;
        }

        .feedback.show {
            display: block;
        }

        .feedback.correct {
            background: #d4edda;
            border-left: 4px solid #28a745;
            color: #155724;
        }

        .feedback.incorrect {
            background: #f8d7da;
            border-left: 4px solid #dc3545;
            color: #721c24;
        }

        .feedback.info {
            background: #d1ecf1;
            border-left: 4px solid #17a2b8;
            color: #0c5460;
        }

        .feedback.warning {
            background: #fff3cd;
            border-left: 4px solid #ffc107;
            color: #856404;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ESTADÍSTICAS */
        .stats-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
        }

        .stat-card h4 {
            font-size: 0.9em;
            opacity: 0.95;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .stat-card .value {
            font-size: 2.5em;
            font-weight: bold;
        }

        .alert-box {
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            animation: slideIn 0.3s ease;
        }

        .alert-warning {
            background: #fff3cd;
            border-left: 4px solid #ffc107;
            color: #856404;
        }

        .alert-danger {
            background: #f8d7da;
            border-left: 4px solid #dc3545;
            color: #721c24;
        }

        .alert-success {
            background: #d4edda;
            border-left: 4px solid #28a745;
            color: #155724;
        }

        /* FOOTER */
        .footer {
            background: #f8f9fa;
            padding: 20px;
            text-align: center;
            border-top: 2px solid #e9ecef;
            color: #6c757d;
            font-size: 0.9em;
        }

        /* MODAL */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
            animation: fadeIn 0.3s ease;
        }

        .modal.show {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background-color: white;
            padding: 30px;
            border-radius: 10px;
            width: 90%;
            max-width: 600px;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #e9ecef;
        }

        .modal-header h2 {
            color: #667eea;
            margin: 0;
        }

        .close-modal {
            background: none;
            border: none;
            font-size: 1.5em;
            cursor: pointer;
            color: #6c757d;
            padding: 0;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .close-modal:hover {
            color: #667eea;
            transform: none;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            .main-wrapper {
                flex-direction: column;
                min-height: auto;
            }

            .sidebar {
                width: 100%;
                max-height: auto;
                border-right: none;
                border-bottom: 2px solid #e9ecef;
            }

            .content {
                padding: 20px;
                max-height: auto;
            }

            .header h1 {
                font-size: 1.8em;
            }

            .stats-container {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        /* UTILIDADES */
        .hidden {
            display: none !important;
        }

        .text-center {
            text-align: center;
        }

        .mt-20 {
            margin-top: 20px;
        }

        .mb-20 {
            margin-bottom: 20px;
        }

        .blocked-notice {
            display: none;
            text-align: center;
            padding: 30px;
        }

        .blocked-notice.show {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- HEADER -->
        <div class="header">
            <h1>📐 Álgebra Básica</h1>
            <p>UCompensar | Domina los fundamentos del álgebra: términos, expresiones y operaciones</p>
        </div>

        <div class="main-wrapper">
            <!-- SIDEBAR -->
            <div class="sidebar">
                <h3>📚 Módulos</h3>
                
                <div class="nav-section">
                    <h4>Fundamentales</h4>
                    <button class="module-btn active" onclick="loadModule(0)">Módulo 0: Términos</button>
                    <button class="module-btn" id="btn-mod1" onclick="loadModule(1)">Módulo 1: Expresiones</button>
                    <button class="module-btn" id="btn-mod2" onclick="loadModule(2)">Módulo 2: Exponentes</button>
                    <button class="module-btn" id="btn-mod3" onclick="loadModule(3)">Módulo 3: Signos</button>
                    <button class="module-btn" id="btn-mod4" onclick="loadModule(4)">Módulo 4: Suma/Resta</button>
                    <button class="module-btn" id="btn-mod5" onclick="loadModule(5)">Módulo 5: Multiplicación</button>
                </div>

                <div class="nav-section">
                    <h4>Herramientas</h4>
                    <button class="module-btn" onclick="openReport()">📊 Reporte</button>
                </div>
            </div>

            <!-- CONTENT AREA -->
            <div class="content" id="content">
                <!-- Contenido dinámico -->
            </div>
        </div>

        <!-- FOOTER -->
        <div class="footer">
            <p>Plataforma Educativa de Álgebra Básica | Diseñada para estudiantes de primer semestre de la UCompensar, Por Astrid Bolívar</p>
        </div>
    </div>

    <!-- MODAL REPORTE -->
    <div class="modal" id="reportModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>📊 Reporte de Progreso</h2>
                <button class="close-modal" onclick="closeReport()">✕</button>
            </div>
            <div id="reportContent"></div>
        </div>
    </div>

    <script>
        // ============================================
        // SISTEMA CORE
        // ============================================

        const modules = {
            0: { title: "Módulo 0: Términos Algebraicos", content: getModule0Content(), required: null },
            1: { title: "Módulo 1: Clasificación de Expresiones", content: getModule1Content(), required: 0 },
            2: { title: "Módulo 2: Leyes de los Exponentes", content: getModule2Content(), required: 1 },
            3: { title: "Módulo 3: Leyes de los Signos", content: getModule3Content(), required: 2 },
            4: { title: "Módulo 4: Suma y Resta", content: getModule4Content(), required: 3 },
            5: { title: "Módulo 5: Multiplicación", content: getModule5Content(), required: 4 }
        };

        let progress = JSON.parse(localStorage.getItem('algebraProgress')) || {
            modulesCompleted: {},
            exerciseResults: {},
            attempts: {}
        };

        // ============================================
        // CONTROL DE ACCESO
        // ============================================

        function getModulePercentage(moduleId) {
            const stats = progress.exerciseResults[moduleId];
            if (!stats || stats.total === 0) return 0;
            return (stats.correct / stats.total) * 100;
        }

        function canAccessModule(moduleId) {
            const requiredModule = modules[moduleId]?.required;
            if (requiredModule === null) return true;
            
            // Verificar si el módulo requerido tiene ≥70%
            const requiredPercentage = getModulePercentage(requiredModule);
            return requiredPercentage >= 70;
        }

        function checkModuleBlocking() {
            for (let id in modules) {
                const btn = document.getElementById(`btn-mod${id}`);
                if (!btn) continue;

                const percentage = getModulePercentage(id);
                const isAccessible = canAccessModule(id);

                if (isAccessible) {
                    btn.classList.remove('locked');
                    btn.onclick = () => loadModule(id);
                } else {
                    btn.classList.add('locked');
                    btn.onclick = (e) => {
                        e.preventDefault();
                        showBlockedModal(id);
                    };
                }

                // Marcar como completado si tiene ≥70%
                if (percentage >= 70) {
                    btn.classList.add('completed');
                }
            }
        }

        function showBlockedModal(moduleId) {
            const requiredModule = modules[moduleId]?.required;
            const requiredTitle = modules[requiredModule]?.title || "Módulo anterior";
            const requiredPercentage = Math.round(getModulePercentage(requiredModule));
            alert(`❌ Módulo Bloqueado\n\nDebes completar "${requiredTitle}" con una calificación ≥70%.\n\nActualmente: ${requiredPercentage}%\n\nIntenta nuevamente o usa los módulos de refuerzo.`);
        }

        // ============================================
        // CARGA DE MÓDULOS
        // ============================================

        function loadModule(moduleId) {
            if (!canAccessModule(moduleId)) {
                showBlockedModal(moduleId);
                return;
            }

            const module = modules[moduleId];
            document.querySelectorAll('.module-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`btn-mod${moduleId}`)?.classList.add('active');

            document.getElementById('content').innerHTML = module.content;
            loadModuleStats(moduleId);
            saveProgress();
        }

        function loadModuleStats(moduleId) {
            const stats = progress.exerciseResults[moduleId] || { correct: 0, total: 0, weaknesses: [] };
            const percentage = stats.total > 0 ? Math.round((stats.correct / stats.total) * 100) : 0;

            let html = `
                <div class="stats-container">
                    <div class="stat-card">
                        <h4>Ejercicios Correctos</h4>
                        <div class="value">${stats.correct}/${stats.total}</div>
                    </div>
                    <div class="stat-card">
                        <h4>Desempeño</h4>
                        <div class="value">${percentage}%</div>
                    </div>
            `;

            if (stats.total > 0 && percentage >= 70) {
                html += `
                    <div class="stat-card" style="background: linear-gradient(135deg, #28a745 0%, #20c997 100%);">
                        <h4>✓ Puedes Avanzar</h4>
                        <div class="value" style="font-size: 1.5em;">¡Aprobado!</div>
                    </div>
                `;
            } else if (stats.total > 0 && percentage < 70) {
                html += `
                    <div class="stat-card" style="background: linear-gradient(135deg, #dc3545 0%, #ff6b6b 100%);">
                        <h4>⚠️ Necesitas 70%</h4>
                        <div class="value" style="font-size: 1.5em;">${percentage}%</div>
                    </div>
                `;
            }

            html += '</div>';

            const contentDiv = document.getElementById('content');
            const h2 = contentDiv.querySelector('h2');
            if (h2) {
                h2.insertAdjacentHTML('afterend', html);
            }
        }

        // ============================================
        // MÓDULO 0: TÉRMINOS ALGEBRAICOS
        // ============================================

        function getModule0Content() {
            return `
                <h2>Módulo 0: Términos Algebraicos</h2>
                
                <div class="section">
                    <h3>¿Qué es un Término Algebraico?</h3>
                    <div class="definition-box">
                        Un <strong>término algebraico</strong> es la unidad fundamental del álgebra. Consiste en una 
                        <strong>combinación de números y letras (variables) conectados por multiplicación</strong>. 
                        No contiene sumas ni restas internas.
                    </div>

                    <h4 style="color: #495057; margin-top: 20px; margin-bottom: 10px;">Partes de un Término</h4>
                    <div class="formula">
                        <strong>Forma general:</strong> ±[Coeficiente][Variable]^[Exponente]
                    </div>
                    
                    <div class="example-box">
                        <h4>Ejemplo: −3x²</h4>
                        <p>• <strong>Signo:</strong> − (negativo)</p>
                        <p>• <strong>Coeficiente:</strong> 3</p>
                        <p>• <strong>Variable:</strong> x</p>
                        <p>• <strong>Exponente:</strong> 2</p>
                    </div>

                    <h4 style="color: #495057; margin-top: 20px; margin-bottom: 10px;">Grado de un Término</h4>
                    <div class="definition-box">
                        El <strong>grado</strong> es la suma de los exponentes de todas las variables.
                    </div>

                    <h4 style="color: #495057; margin-top: 20px; margin-bottom: 10px;">Términos Semejantes</h4>
                    <div class="definition-box">
                        Dos términos son <strong>semejantes</strong> si tienen exactamente las mismas variables 
                        con los mismos exponentes.
                    </div>
                </div>

                <div class="section">
                    <h3>Ejercicios Prácticos</h3>

                    <div class="exercise-container">
                        <div class="exercise-title">
                            Ejercicio 1: Identificación de Componentes
                            <span class="exercise-difficulty difficulty-basic">Básico</span>
                        </div>
                        <div class="question">Del término <strong>−5xy²</strong>, ¿cuál es el grado?</div>
                        <div class="input-group">
                            <input type="number" id="ex1_m0">
                        </div>
                        <button onclick="checkEx(0, 1)">Verificar</button>
                        <div id="feedback_0_1" class="feedback"></div>
                    </div>

                    <div class="exercise-container">
                        <div class="exercise-title">
                            Ejercicio 2: Error Conceptual
                            <span class="exercise-difficulty difficulty-basic">Básico</span>
                        </div>
                        <div class="question">¿Son semejantes <strong>3x²</strong> y <strong>3x³</strong>? Justifica tu respuesta en máximo 30 palabras.</div>
                        <div class="input-group">
                            <textarea id="ex2_m0"></textarea>
                        </div>
                        <button onclick="checkEx(0, 2)">Verificar</button>
                        <div id="feedback_0_2" class="feedback"></div>
                    </div>

                    <div class="exercise-container">
                        <div class="exercise-title">
                            Ejercicio 3: Aplicación
                            <span class="exercise-difficulty difficulty-intermediate">Intermedio</span>
                        </div>
                        <div class="question">De los siguientes términos, selecciona cuál es semejante a <strong>7a²b</strong>: (A) 7a²b², (B) −2a²b, (C) 7ab², (D) 14ba²</div>
                        <div style="margin: 15px 0;">
                            <label style="display: block; margin-bottom: 8px;"><input type="radio" name="ex3_m0" value="A"> A) 7a²b²</label>
                            <label style="display: block; margin-bottom: 8px;"><input type="radio" name="ex3_m0" value="B"> B) −2a²b</label>
                            <label style="display: block; margin-bottom: 8px;"><input type="radio" name="ex3_m0" value="C"> C) 7ab²</label>
                            <label style="display: block;"><input type="radio" name="ex3_m0" value="D"> D) 14ba²</label>
                        </div>
                        <button onclick="checkEx(0, 3)">Verificar</button>
                        <div id="feedback_0_3" class="feedback"></div>
                    </div>

                    <div class="exercise-container">
                        <div class="exercise-title">
                            Ejercicio 4: Identificación Múltiple
                            <span class="exercise-difficulty difficulty-intermediate">Intermedio</span>
                        </div>
                        <div class="question">¿Cuál es el coeficiente del término <strong>−ab³c</strong>?</div>
                        <div class="input-group">
                            <input type="number" id="ex4_m0">
                        </div>
                        <button onclick="checkEx(0, 4)">Verificar</button>
                        <div id="feedback_0_4" class="feedback"></div>
                    </div>

                    <div class="exercise-container">
                        <div class="exercise-title">
                            Ejercicio 5: Error Conceptual Avanzado
                            <span class="exercise-difficulty difficulty-advanced">Avanzado</span>
                        </div>
                        <div class="question">Un estudiante afirma que <strong>2x + 3y</strong> es un término algebraico. ¿Está correcto? Justifica brevemente.</div>
                        <div class="input-group">
                            <textarea id="ex5_m0"></textarea>
                        </div>
                        <button onclick="checkEx(0, 5)">Verificar</button>
                        <div id="feedback_0_5" class="feedback"></div>
                    </div>

                    <div class="exercise-container">
                        <div class="exercise-title">
                            Ejercicio 6: Aplicación Compleja
                            <span class="exercise-difficulty difficulty-advanced">Avanzado</span>
                        </div>
                        <div class="question">Dado el conjunto de términos: {5x²y, −3xy², 7x²y, −xy², 8yx²}, ¿cuántos pares de términos semejantes hay?</div>
                        <div class="input-group">
                            <input type="number" id="ex6_m0">
                        </div>
                        <button onclick="checkEx(0, 6)">Verificar</button>
                        <div id="feedback_0_6" class="feedback"></div>
                    </div>
                </div>

                <div style="text-align: center; margin-top: 30px;">
                    <button class="btn-success" onclick="completeModule(0)" id="complete-btn-0" style="display:none;">✓ Completar Módulo</button>
                </div>
            `;
        }

        // ============================================
        // FUNCIONES DE EJERCICIOS
        // ============================================

        function checkEx(moduleId, exerciseId) {
            const solutions = {
                0: {
                    1: { type: 'number', answer: 3 },
                    2: { type: 'text', keywords: ['no', 'semejantes', 'exponentes'], minLength: 15 },
                    3: { type: 'radio', answer: 'B' },
                    4: { type: 'number', answer: -1 },
                    5: { type: 'text', keywords: ['no', 'expresión', 'término'], minLength: 20 },
                    6: { type: 'number', answer: 2 }
                }
            };

            if (!solutions[moduleId] || !solutions[moduleId][exerciseId]) {
                console.error('Ejercicio no definido');
                return;
            }

            // Evitar doble validación
            const feedbackEl = document.getElementById(`feedback_${moduleId}_${exerciseId}`);
            if (feedbackEl.classList.contains('show')) {
                alert('Ya validaste este ejercicio. Pasa al siguiente.');
                return;
            }

            const solution = solutions[moduleId][exerciseId];
            let isCorrect = false;
            let message = '';

            if (solution.type === 'number') {
                const userAnswer = parseInt(document.getElementById(`ex${exerciseId}_m${moduleId}`).value);
                isCorrect = userAnswer === solution.answer;
                if (!isCorrect) message = `Respuesta correcta: ${solution.answer}`;
            } else if (solution.type === 'text') {
                const userAnswer = document.getElementById(`ex${exerciseId}_m${moduleId}`).value.toLowerCase().trim();
                // Validar que tenga ALGUNO de los keywords principales + longitud mínima
                const hasCriticalKeyword = userAnswer.includes('no') || userAnswer.includes('falso');
                const hasExpressionOrTerm = userAnswer.includes('expresión') || userAnswer.includes('término') || userAnswer.includes('suma');
                isCorrect = (hasCriticalKeyword && hasExpressionOrTerm && userAnswer.length >= solution.minLength);
                if (!isCorrect) message = 'Debes justificar por qué no es un término algebraico. Menciona que contiene suma/resta o que es una expresión.';
            } else if (solution.type === 'radio') {
                const userAnswer = document.querySelector(`input[name="ex${exerciseId}_m${moduleId}"]:checked`)?.value;
                isCorrect = userAnswer === solution.answer;
                if (!isCorrect) message = `Respuesta correcta: ${solution.answer}`;
            }

            displayFeedback(feedbackEl, isCorrect, message);
            recordExerciseResult(moduleId, isCorrect);
            checkCompleteButton(moduleId);
        }

        function displayFeedback(element, isCorrect, message) {
            element.classList.remove('correct', 'incorrect');
            element.classList.add('show', isCorrect ? 'correct' : 'incorrect');

            if (isCorrect) {
                element.innerHTML = '✓ ¡Correcto!';
            } else {
                element.innerHTML = `✗ Incorrecto. ${message}`;
            }
        }

        function recordExerciseResult(moduleId, isCorrect) {
            if (!progress.exerciseResults[moduleId]) {
                progress.exerciseResults[moduleId] = { correct: 0, total: 0, weaknesses: [] };
            }

            progress.exerciseResults[moduleId].total++;
            if (isCorrect) {
                progress.exerciseResults[moduleId].correct++;
            }

            saveProgress();
        }

        function checkCompleteButton(moduleId) {
            const stats = progress.exerciseResults[moduleId];
            if (stats && stats.total === 6) {
                const percentage = (stats.correct / stats.total) * 100;
                const btn = document.getElementById(`complete-btn-${moduleId}`);
                if (btn && percentage >= 70) {
                    btn.style.display = 'block';
                }
            }
        }

        function completeModule(moduleId) {
            const percentage = Math.round(getModulePercentage(moduleId));

            if (percentage < 70) {
                alert(`⚠️ Calificación insuficiente (${percentage}%)\n\nDebes obtener al menos 70% para completar este módulo.\n\nTe recomendamos:\n1. Revisar el contenido\n2. Intentar nuevamente los ejercicios\n3. Usar los módulos de refuerzo si están disponibles`);
                return;
            }

            // Solo registrar que se vio el módulo
            progress.modulesCompleted[moduleId] = true;
            saveProgress();
            checkModuleBlocking();
            
            alert(`✓ ¡Módulo completado exitosamente!\n\nCalificación: ${percentage}%\n\nPuedes avanzar al siguiente módulo.`);
        }

        function saveProgress() {
            localStorage.setItem('algebraProgress', JSON.stringify(progress));
        }

        // ============================================
        // MÓDULOS 1-5 (STUBS)
        // ============================================

        function getModule1Content() {
            return `
                <h2>Módulo 1: Clasificación de Expresiones Algebraicas</h2>
                <div class="alert-box alert-warning">
                    <strong>⚠️ En desarrollo</strong> - Este módulo se activará próximamente con 6 ejercicios rigurosos.
                </div>
                <div style="text-align: center; margin-top: 30px;">
                    <button class="btn-success" onclick="completeModule(1)">✓ Marcar Completado (Temporal)</button>
                </div>
            `;
        }

        function getModule2Content() {
            return `
                <h2>Módulo 2: Leyes de los Exponentes</h2>
                <div class="alert-box alert-warning">
                    <strong>⚠️ En desarrollo</strong> - Este módulo se activará próximamente con 6 ejercicios rigurosos.
                </div>
                <div style="text-align: center; margin-top: 30px;">
                    <button class="btn-success" onclick="completeModule(2)">✓ Marcar Completado (Temporal)</button>
                </div>
            `;
        }

        function getModule3Content() {
            return `
                <h2>Módulo 3: Leyes de los Signos</h2>
                <div class="alert-box alert-warning">
                    <strong>⚠️ En desarrollo</strong> - Este módulo se activará próximamente con 6 ejercicios rigurosos.
                </div>
                <div style="text-align: center; margin-top: 30px;">
                    <button class="btn-success" onclick="completeModule(3)">✓ Marcar Completado (Temporal)</button>
                </div>
            `;
        }

        function getModule4Content() {
            return `
                <h2>Módulo 4: Suma y Resta de Términos Algebraicos</h2>
                <div class="alert-box alert-warning">
                    <strong>⚠️ En desarrollo</strong> - Este módulo se activará próximamente con 6 ejercicios rigurosos.
                </div>
                <div style="text-align: center; margin-top: 30px;">
                    <button class="btn-success" onclick="completeModule(4)">✓ Marcar Completado (Temporal)</button>
                </div>
            `;
        }

        function getModule5Content() {
            return `
                <h2>Módulo 5: Multiplicación de Expresiones Algebraicas</h2>
                <div class="alert-box alert-warning">
                    <strong>⚠️ En desarrollo</strong> - Este módulo se activará próximamente con 6 ejercicios rigurosos.
                </div>
                <div style="text-align: center; margin-top: 30px;">
                    <button class="btn-success" onclick="completeModule(5)">✓ Marcar Completado (Temporal)</button>
                </div>
            `;
        }

        // ============================================
        // REPORTE
        // ============================================

        function openReport() {
            document.getElementById('reportModal').classList.add('show');
            generateReport();
        }

        function closeReport() {
            document.getElementById('reportModal').classList.remove('show');
        }

        function generateReport() {
            const reportContent = document.getElementById('reportContent');
            
            let totalCorrect = 0;
            let totalExercises = 0;

            for (let moduleId in progress.exerciseResults) {
                const stats = progress.exerciseResults[moduleId];
                totalCorrect += stats.correct;
                totalExercises += stats.total;
            }

            const overallPercentage = totalExercises > 0 ? Math.round((totalCorrect / totalExercises) * 100) : 0;
            const completedModules = Object.keys(progress.modulesCompleted).length;

            let html = `
                <h3>📊 Resumen General</h3>
                <div class="stats-container">
                    <div class="stat-card">
                        <h4>Módulos Completados</h4>
                        <div class="value">${completedModules}/6</div>
                    </div>
                    <div class="stat-card">
                        <h4>Ejercicios Correctos</h4>
                        <div class="value">${totalCorrect}/${totalExercises}</div>
                    </div>
                    <div class="stat-card">
                        <h4>Desempeño General</h4>
                        <div class="value">${overallPercentage}%</div>
                    </div>
                </div>

                <h3 style="margin-top: 30px;">📋 Detalle por Módulo</h3>
            `;

            for (let moduleId in progress.exerciseResults) {
                const stats = progress.exerciseResults[moduleId];
                const moduleTitle = modules[moduleId]?.title || `Módulo ${moduleId}`;
                const percentage = stats.total > 0 ? Math.round((stats.correct / stats.total) * 100) : 0;
                
                html += `
                    <div style="background: #f8f9fa; padding: 15px; border-radius: 6px; margin-bottom: 15px;">
                        <strong>${moduleTitle}</strong>
                        <div style="margin-top: 10px;">
                            <div style="display: flex; justify-content: space-between; margin-bottom: 5px;">
                                <span>Aciertos: ${stats.correct}/${stats.total}</span>
                                <span>${percentage}%</span>
                            </div>
                            <div class="progress-bar-container" style="margin: 10px 0;">
                                <div class="progress-bar" style="width: ${percentage}%"></div>
                            </div>
                            <div style="color: ${percentage >= 70 ? '#28a745' : '#dc3545'}; font-weight: bold; margin-top: 5px;">
                                ${percentage >= 70 ? '✓ Aprobado' : '✗ No aprobado'}
                            </div>
                        </div>
                    </div>
                `;
            }

            html += `
                <div style="margin-top: 30px; text-align: center;">
                    <button class="btn-secondary" onclick="exportReport()">📥 Descargar Reporte</button>
                </div>
            `;

            reportContent.innerHTML = html;
        }

        function exportReport() {
            const reportText = `REPORTE DE PROGRESO - ÁLGEBRA BÁSICA\nUCompensar | ${new Date().toLocaleString()}\n${'='.repeat(50)}\n\nRESUMEN GENERAL:\n`;
            
            let totalCorrect = 0, totalExercises = 0;
            for (let id in progress.exerciseResults) {
                totalCorrect += progress.exerciseResults[id].correct;
                totalExercises += progress.exerciseResults[id].total;
            }

            const finalText = reportText + 
                `Módulos completados: ${Object.keys(progress.modulesCompleted).length}/6\n` +
                `Ejercicios correctos: ${totalCorrect}/${totalExercises}\n` +
                `Desempeño general: ${totalExercises > 0 ? Math.round((totalCorrect/totalExercises)*100) : 0}%\n`;

            const blob = new Blob([finalText], { type: 'text/plain' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `Reporte_Algebra_${new Date().toISOString().split('T')[0]}.txt`;
            link.click();
        }

        // INICIALIZACIÓN
        window.addEventListener('load', () => {
            loadModule(0);
            checkModuleBlocking();
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeReport();
        });
    </script>
</body>
</html>
